name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: synkmusic-rpc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: synkmusic-rpc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          name="synkmusic-rpc-${{ matrix.target }}"
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            name="${name}.exe"
          fi
          cp "$src" "$name"
          echo "ASSET_NAME=$name" >> "$GITHUB_ENV"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
